<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghost Digital Clock</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
  <div id="clock-container">
    <div id="date">----/--/-- (---)</div>
    <div id="clock">--:--:--</div>
  </div>

  <div id="button-container">
    <!-- GitHub ソースコードページへのリンク -->
    <a id="info-btn" class="float-btn" href="https://github.com/ユーザー名/ghost-digital-clock" target="_blank" title="このアプリについて"><span class="material-symbols-rounded">info_i</span></a>
    <button id="settings-btn" class="float-btn" title="設定"><span class="material-symbols-rounded">settings</span></button>
    <button id="fullscreen-btn" class="float-btn" title="全画面切替"><span class="material-symbols-rounded">fullscreen</span></button>
  </div>

  <div id="settings-panel">
    <h3>設定</h3>
    <label>背景色:<input type="color" id="bg-picker" value="#000000"></label>
    <label>文字色:<input type="color" id="color-picker" value="#ffffff"></label>
    <label>フォント:
      <select id="font-select">
        <option value='"Arial", "Helvetica", "メイリオ", "ヒラギノ角ゴ Pro W3",  sans-serif'>ゴシック</option>
        <option value='"Times New Roman", "ヒラギノ明朝 Pro W3", "Hiragino Mincho Pro", "HiraMinProN-W3", "HGS明朝E", "ＭＳ Ｐ明朝", "MS PMincho", serif'>明朝</option>
      </select>
    </label>
    <label>時計サイズ:
      <select id="size-select">
        <option value="small">小</option>
        <option value="medium">中</option>
        <option value="large">大</option>
        <option value="xlarge">特大</option>
      </select>
    </label>
    <label>時刻形式:
      <select id="hour-format">
        <option value="24" selected>24時間</option>
        <option value="12">12時間</option>
      </select>
    </label>
    <label>日付位置:
      <select id="date-pos">
        <option value="top">上</option>
        <option value="bottom">下</option>
      </select>
    </label>
    <label><input type="checkbox" id="hover-toggle">マウスオーバー時のみ表示</label>
    <label><input type="checkbox" id="date-toggle" checked>日付表示</label>
    <label><input type="checkbox" id="sec-toggle" checked>秒表示</label>
  </div>

  <script src="script.js"></script>
</body>
</html>
